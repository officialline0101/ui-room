<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約フォーム</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        /* 右端の細いナビ（固定） */
        .side-nav {
            position: fixed;
            /* 画面スクロールしても固定 */
            right: -5px;
            /* さらに右へ */
            top: 80%;
            /* 画面中央に固定 */
            transform: translateY(-50%) translateX(16px);
            /* 中央配置と右ずらし */
            background: #3e3f41;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px;
            border-radius: 10px 0 0 10px;
            z-index: 1000;
            width: 35px;
            /* さらに細く */
        }

        .side-nav a:active {
            transform: scale(1.0);
            /* タップした後に元のサイズに戻す */
        }

        .side-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 10px;
            margin: 5px 0;
            padding: 5px;
            transition: background 0.3s, transform 0.2s;
            border-radius: 5px;
            width: 30px;
            height: 30px;
            text-align: center;
        }

        .side-nav a span {
            font-size: 24px;
            /* 矢印をさらに大きく */
            position: absolute;
            left: 2px;
            /* 左端に寄せる */
            top: 13px;
            /* さらに下へ */
        }

        /* スマホ用の微調整 */
        @media (max-width: 600px) {
            .side-nav {
                right: 2px;
                /* スマホではさらに右端に */
                width: 30px;
                /* もっと細く */
            }

            .side-nav a {
                width: 28px;
                height: 28px;
            }

            .side-nav a i {
                font-size: 12px;
                /* スマホではもっと小さく */
            }
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 5px;
            overflow-x: hidden;
        }

        .container {
            background-color: #fdfdfd;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 96%;
            max-width: 500px;
            padding: 25px;
            box-sizing: border-box;
            margin: 0 auto;
        }

        h1 {
            background: linear-gradient(135deg, #3e3f41, #0c0c0c);
            color: white;
            padding: 20px;
            border-radius: 0 0px 0px 0px;
            text-align: center;
            display: block;
            margin: -20px -15px 20px -15px;
            font-size: 26px;
            font-weight: 100;
            box-shadow: inset 0 -5px 10px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .label {
            display: block;
            margin-bottom: 20px;
            padding: 3px;
            font-weight: 400;
            background-color: #ffffff;
            color: #1f1f20;
            border-radius: 0px;
            font-size: 18px;
            text-align: center;
            text-indent: 20px;
            position: relative;
            overflow: hidden;
            border-top: 3px solid black;
            /* 上の線 */
            border-bottom: 3px solid black;
            /* 下の線 */
        }

        .labeltyuuou {
            display: block;
            margin-bottom: 20px;
            padding: 3px;
            background-color: #ffffff;
            color: #1f1f20;
            border-radius: 0px;
            font-size: 18px;
            text-align: center;
            text-indent: 0px;
            position: relative;
            overflow: hidden;
            border-top: 2px solid black;
            /* 上の線 */
            border-bottom: 2px solid black;
            /* 下の線 */
        }

        .labelContent {
            display: block;
            margin-bottom: 10px;
            padding: 3px;
            font-weight: 400;
            background-color: #ffffff;
            color: rgb(20, 20, 20);
            border-radius: 0px;
            font-size: 18px;
            text-align: center;
            text-indent: 0px;
            position: relative;
            overflow: hidden;
            border-top: 1px solid black;
            /* 上の線 */
            border-bottom: 1px solid black;
            /* 下の線 */
        }

        /* 必須マークのスタイル */
        .required {
            color: red;
            font-weight: bold;
            margin-left: 5px;
        }

        .required-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #13ca5e;
            font-weight: bold;
            font-size: 0.9em;
            border-radius: 4px;
            padding: 2px 6px;
            border: 2px solid #13ca5e;
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #555555;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s;

            /* 以下を追加 */
            position: relative;
            top: -5px;
            /* ← 上に5pxずらす（数値調整OK） */
        }

        .visit-buttons,
        .symptoms,
        .menu-sections,
        .irradiations {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .visit-buttons button,
        .symptoms button,
        .menu-sections button,
        .irradiations button {
            flex: 1;
            padding: 10px;
            border: 1px solid #2e2e2e;
            border-radius: 4px;
            background-color: #ffffff;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
            white-space: nowrap;
        }

        .visit-buttons button.active,
        .symptoms button.active,
        .menu-sections button.active,
        .irradiations button.active {
            background-color: #ffffff;
            color: #141414;
        }

        .date-inputs input[type="datetime-local"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .submit-button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 4px;
            background-color: #ff4c4c;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }

        .calendar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            width: 100%;
        }

        .calendar {
            flex: 1;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
        }

        .calendar table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            /* セル幅を均等にする */
        }

        .calendar th,
        .calendar td {
            font-size: 12.5px;
            /* ここでフォントサイズを変更 */
            text-align: center;
            padding: 5px;
            cursor: pointer;
            vertical-align: top;
            width: auto;
            /* 通常のセルは自動調整 */
            box-sizing: border-box;
            border: 1px solid #1a1a1a;
        }

        .calendar th:first-child,
        .calendar td:first-child {
            width: 17%;
            /* ここで時間列の幅を調整 */
            font-size: 12.5px;
            /* フォントサイズを変更 */
        }

        .calendar th {
            background-color: #f7f7f7;
        }

        .calendar td:hover {
            background-color: #ddd;
        }

        .calendar td.selected {
            background-color: #3e3f41;
            color: #fff;
        }

        .week-button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .week-button {
            padding: 10px 20px;
            background-color: #ffffff;
            color: #222222;
            border: 1px solid black;
            /* ← 外枠を黒1pxに設定 */
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            transform-origin: center center;
        }

        .week-button:hover {
            background-color: #ffffff;
            transform: scale(1.15);
            /* ドーン！ってくらい拡大🔥 */
        }

        .week-button:active {
            transform: scale(0.95);
            /* クリックした瞬間にギュッと縮む💥 */
        }

        .month-button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .month-button {
            padding: 10px 20px;
            background-color: #ffffff;
            color: #222222;
            border: 1px solid black;
            /* ← 外枠を黒1pxに設定 */
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            transform-origin: center center;
        }

        .month-button:hover {
            background-color: #ffffff;
            transform: scale(1.15);
            /* ドーン！ってくらい拡大🔥 */
        }

        .month-button:active {
            transform: scale(0.95);
            /* クリックした瞬間にギュッと縮む💥 */
        }

        .current-month {
            font-size: 16px;
            font-weight: 300;
            color: #3e3f41;
            margin-top: 20px;
            /* 下にずらす */
            display: inline-block;
            /* margin-top を適用しやすくする */
        }

        .loading-spinner {
            position: fixed;
            /* 画面全体に対応 */
            top: 50%;
            /* 縦中央 */
            left: 50%;
            /* 横中央 */
            transform: translate(-50%, -50%);
            display: none;
            /* 初期状態は非表示 */
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6);
            /* 半透明の黒背景で注目度アップ */
            padding: 40px;
            /* 周囲に余白をつける */
            border-radius: 10px;
            /* 角丸で柔らかい印象 */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            /* 少し立体感を追加 */
        }

        .spinner {
            width: 60px;
            /* スピナーをさらに大きく */
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            /* 薄い白で枠を柔らかく */
            border-top-color: #00d1ff;
            /* 明るい青で目立たせる */
            border-radius: 50%;
            /* 丸い形状 */
            animation: spin 0.7s linear infinite;
            /* 滑らかで速い回転 */
            margin-left: 12px;
            /* スピナーを右にずらす */
        }

        .loading-text {
            margin-top: 20px;
            /* スピナーとテキストの間隔 */
            font-size: 15px;
            /* さらに大きなフォントサイズ */
            font-weight: bold;
            /* 太字で目立たせる */
            color: #ffffff;
            /* 純白で高いコントラスト */
            letter-spacing: 1px;
            /* 文字間隔を広げてモダンな印象に */
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            /* テキストに影をつけて視認性アップ */
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .available {
            color: red;
        }

        .unavailable {
            background-color: #d3d3d3;
        }

        .menu-section {
            display: none;
        }

        .menu-section.active {
            display: block;
        }

        #repairLabel,
        #repairButtons {
            display: none;
        }

        #treatment-text {
            background-color: #f9f9f9;
            padding: 16px 20px;
            border: 1px solid #000000;
            border-top: none;
            /* ← 上の横線を非表示 */
            border-radius: 0 0 3px 3px;
            /* ← 上の角の丸みをなくして自然に */
            margin-top: -13px;
            /* ← 少し上に詰める（12px → 4px） */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            font-size: 15px;
            line-height: 1.6;
            color: #000000;
        }

        .highlight-background {
            background-color: #f9f9d6;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            margin-top: 10px;
            /* 上に余白を追加 */
            text-align: center;
            /* コンテナ内の要素を中央に配置 */
        }

        .red-circle {
            color: red;
            /* 赤色に設定 */
        }

        .bold-cross {
            font-weight: bold;
            /* 太文字に設定 */
        }

        .info-text {
            position: relative;
            /* ← 上下移動を有効にする */
            top: -20px;
            /* ← 上に8pxずらす（数値調整可） */
            margin-top: 0;
            /* ← 上のマージンは0にしておくと自然 */
            margin-bottom: 0px;
            font-size: 13px;
            color: #000000;
            line-height: 1.5;
            text-align: center;
            word-wrap: break-word;
            background-color: #f3f3f3;
            padding: 0px;
            border-radius: 0 0 4px 4px;
            border: 1px solid black;
            border-top: none;
        }

        /* スマホ対応 */
        @media (max-width: 768px) {
            .info-text {
                font-size: 11.5px;
                top: -20px;
                /* ← モバイルでは少し控えめに上にずらす */
                line-height: 2.0;
            }
        }

        .symptoms,
        .options {
            display: block;
            /* ボタンを縦並びに */
        }

        .symptoms button,
        .options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #000000;
            border-radius: 4px;
            background-color: #ffffff;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
            white-space: nowrap;
        }

        .symptoms button.active,
        .options button.active {
            background-color: #ffffff;
            color: #000000;
        }

        .highlight-background {
            cursor: pointer;
            background-color: #13ca5e;
            padding: 10px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .symptoms,
        .options {
            display: block;
            /* ボタンを縦並びに */
        }

        .highlight-text {
            display: inline-block;
            color: #080808;
            /* オプションテキストの色 */
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: -6px 0;
        }

        hr {
            margin: -5px 0;
        }

        .edit-button {
            background-color: #ffffff;
            color: #1a1a1a;
            border: 1px solid black;
            /* ← 外枠を黒1pxに設定 */
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            transition: background-color 0.3s;
            white-space: nowrap;
            /* 改行を防ぐ */
            width: auto;
            text-align: center;
        }

        .edit-button:hover {
            background-color: #141414;
            color: #ffffff;
            /* ← 黒背景に合わせて文字色を白にすると視認性が上がります（任意） */
        }

        /* 100点の予約フォームCSS */

        input:focus,
        textarea:focus {
            border-color: #13ca5e;
            outline: none;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #3e3f41;
            color: #000000;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #e9e9e9;
            transform: scale(1.05);
        }

        .submit-button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background-color: #272727;
            margin-top: 12px;
            /* ← ここで下方向にずらす */
        }

        .submit-button:hover {
            background-color: #ffffff;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 22px;
            }

            input,
            button {
                font-size: 14px;
            }
        }

        button.active {
            outline: 1px solid #2b2b2b;
            /* ここで枠線を指定 */
            outline-offset: 2px;
        }

        /* 必須マークのスタイル */
        .required {
            color: #ffffff;
            /* ゴールド（黄色） */
            font-weight: lighter;
            /* 文字を細くする */
            font-size: 0.6em;
            margin-left: 5px;
            vertical-align: 0.8em;
            /* 位置を少し上に調整 */

            /* 白色背景の四角形 */
            background-color: rgb(255, 15, 15);
            padding: 0 5px;
            border-radius: 3px;
            margin-right: 5px;
        }

        .current-month {
            text-align: center;
            display: block;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -10px);
            /* Y方向に上げる */
            background-color: #3e3f41;
            color: #fff;
            padding: 3px 12px;
            /* ボックスのパディングを縮小 */
            border-radius: 8px;
            /* 角の丸みを少し減少 */
            font-size: 1.4rem;
            /* フォントサイズを小さく */
            font-weight: 300;
            box-shadow: 0 2px 6px rgba(47, 103, 167, 0.2);
            /* 影も控えめに */
        }

        /* ナビゲーションバー */
        .sidebar {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #1e1e2d;
            padding: 10px;
            border-radius: 10px 0 0 10px;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            padding: 15px;
            color: white;
            text-decoration: none;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
            background: #4a90e2;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .sidebar a:hover {
            background: #357ac4;
        }

        /* スクロール用のセクション */
        .section {
            padding: 50px 10px;
            margin-top: 30px;
        }

        .repeat-booking-wrapper {
            text-align: center;
            margin: 20px 0;
        }

        #repeatBookingButton {
            background-color: #f7f7f7;
            color: #000000;
            border: 1px solid #000000;
            font-size: 16px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
        }

        #repeatBookingButton:hover {
            background-color: #f1f1f1;
            color: #000000;
        }

        /* U'I 予約フォーム用 追加調整（メニュー・オプションは縦並び＆折り返し可） */
        .symptoms,
        .irradiations {
            display: block;
            margin-bottom: 20px;
        }

        /* メニュー・オプションボタン：タップしやすい余白と高さを確保 */
        .symptoms button,
        .irradiations button {
            display: block;
            width: 100%;
            white-space: normal;
            line-height: 1.5;
            min-height: 52px;
            padding: 14px 16px;
            margin: 0 0 12px 0;
            font-size: 16px;
        }

        .symptoms button:last-child,
        .irradiations button:last-child {
            margin-bottom: 0;
        }

        /* カテゴリー切替ボタン */
        #categoryButtons {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        #categoryButtons button {
            flex: 1;
            white-space: normal;
            line-height: 1.3;
            min-height: 60px;
            padding: 12px 6px;
            font-size: 15px;
        }

        #categoryButtons button.active {
            background-color: #3e3f41;
            color: #ffffff;
        }

        /* スマートフォン向けレスポンシブ調整 */
        @media (max-width: 600px) {
            .container {
                width: 100%;
                padding: 16px;
                border-radius: 0;
            }

            .symptoms button,
            .irradiations button {
                min-height: 56px;
                padding: 16px;
                font-size: 16px;
                margin-bottom: 14px;
            }

            #categoryButtons {
                gap: 6px;
            }

            #categoryButtons button {
                min-height: 64px;
                padding: 10px 4px;
                font-size: 14px;
            }

            .submit-button {
                min-height: 56px;
                font-size: 18px;
            }

            .week-button,
            .month-button {
                min-height: 48px;
                padding: 10px 16px;
            }

            /* カレンダーのセルもタップしやすく */
            .calendar th,
            .calendar td {
                padding: 9px 3px;
                font-size: 13px;
            }
        }

        /* タップ時のハイライトを分かりやすく（誤タップ防止の視覚フィードバック） */
        .symptoms button,
        .irradiations button,
        #categoryButtons button {
            -webkit-tap-highlight-color: rgba(62, 63, 65, 0.15);
        }

        /* 選択中のメニュー・オプションを分かりやすく表示 */
        .symptoms button.active,
        .irradiations button.active {
            background-color: #fff3e6;
            color: #1f1f20;
            border: 2px solid #877059;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <!-- 右側の追従ナビ -->
    <div class="side-nav" id="sideNav">
        <a href="#section-message">
            <span>⇩</span>
            <i class="fas fa-comment"></i>
        </a>
    </div>

    <div class="container">
        <h1>U'I<br>予約フォーム</h1>
        <!-- 追加するボタン -->

            <div id="calendar1" class="calendar">
                <table>
                    <thead>

    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script>
        let visitCount = '';
        let selectedMenu = '';
        let selectedArea = ''; // 選択されたエリア
        let selectedSymptom = [];  // 配列として定義
        let selectedFullDate = '';
        let currentDate = new Date();
        let availabilityCache = {};
        let irradiationsCount = ''; // 選択されたオプションを格納する変数
        let totalAmount = 0; // 合計金額を格納する変数
        let menuPrice = 0; // メニューの価格
        let optionsPrice = 0; // オプションの合計価格

        document.addEventListener('DOMContentLoaded', function () {
            liff.init({
                liffId: '2009938670-lypyrkif'
            }).then(() => {
                console.log('LIFF初期化成功');
            }).catch((err) => {
                console.log('LIFF初期化失敗', err);
            });

            fetchAvailability(currentDate);
        });

        let selectedVisitTime = 0; // 訪問回数で選択された時間（来店回数なしのため0固定）

        // オプション時間設定（今回はオプションなし）
        let irradiationsTimes = {
            'なし': 0
        };

        let selectedirradiationsTime = 0; // オプションの時間

        // メニュー時間設定（カレンダーに使う所要時間）
        let menuTimes = {
            'フェイシャルエステ　50分　7,700円': 60, // 予約枠60分
            '足ツボ　30分　3,300円': 40              // 予約枠40分
        };

        let selectedMenuTime = 0;

        // 入力内容をローカルストレージに保存
        function saveInput(id) {
            const value = document.getElementById(id).value;
            localStorage.setItem(id, value);
        }

        // 名前・電話番号入力欄は無し（復元処理なし）

        // スムーズスクロール
        document.querySelectorAll('.side-nav a').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetElement = document.getElementById(targetId);
                if (targetElement) {
                    window.scrollTo({
                        top: targetElement.offsetTop - 20,
                        behavior: 'smooth'
                    });
                }
            });
        });

        // エリア選択（単一選択）
        function selectArea(button) {
            document.querySelectorAll('#areaButtons button').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            selectedArea = button.innerText;
            updateDisplayInfo();
        }

        function updateDisplayInfo() {
            const selectedSymptomText = selectedSymptom.length > 0
                ? `<span style="color:#0c0c0c;"><strong>メニュー</strong></span><br>・${selectedSymptom.join('<br>・')}`
                : '・メニューが未選択です';

            const irradiationsText = irradiationsCount
                ? `<span style="color:#0c0c0c;"><strong>オプション</strong></span><br>・${irradiationsCount.split(', ').join('<br>・')}`
                : '・オプション無し';

            let totalMinutes = selectedMenuTime + selectedirradiationsTime;
            let hours = Math.floor(totalMinutes / 60);
            let minutes = totalMinutes % 60;
            let totalTimeText = `<span style="color:#0c0c0c;"><strong>所要時間</strong></span>：${hours > 0 ? hours + '時間' : ''}${minutes}分`;

            const selectedDateText = selectedFullDate ? `<span style="color:#0c0c0c;"><strong>希望日時</strong></span>：${selectedFullDate}` : '・日時が未選択です';

            // 修正ボタン付きのHTMLを作成（お名前・電話番号の表示なし）
            document.getElementById('displayInfo').innerHTML = `
        <div class="info-row">
            <p>${selectedSymptomText}</p>
            <button class="edit-button" onclick="scrollToElement('course')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p>${irradiationsText}</p>
            <button class="edit-button" onclick="scrollToElement('course')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p>${totalTimeText}</p>
        </div>
        <hr>
        <div class="info-row">
            <p>${selectedDateText}</p>
            <button class="edit-button" onclick="scrollToElement('calendar1')">修正</button>
        </div>
        <hr>
    `;
        }

        // 選択したメニューを保存
        function saveMenuSelection(menuType) {
            localStorage.setItem('selectedMenu', menuType);
        }

        // メニューを選択したときにローカルストレージに保存
        function showMenu(menuType) {
            document.querySelectorAll('.menu-section').forEach(section => section.style.display = 'none');
            document.getElementById(menuType).style.display = 'block';
            saveMenuSelection(menuType);
        }

        function applyPreviousSelection() {
            const savedSymptoms = JSON.parse(localStorage.getItem('selectedSymptoms') || '[]');
            const savedIrradiations = JSON.parse(localStorage.getItem('selectedIrradiations') || '[]');

            if (savedSymptoms.length === 0 && savedIrradiations.length === 0) {
                alert('前回のメニューが見つかりません💦');
                return;
            }

            // 一旦すべての選択を解除
            document.querySelectorAll('.symptoms button.active, .irradiations button.active').forEach(btn => {
                btn.classList.remove('active');
            });

            // メニュー再選択（複数）
            savedSymptoms.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.classList.add('active');
            });

            // オプション再選択（複数）
            savedIrradiations.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.classList.add('active');
            });

            // 集計を更新
            const activeMenus = document.querySelectorAll('.symptoms button.active');
            selectedSymptom = Array.from(activeMenus).map(btn => btn.textContent.trim());
            selectedMenuTime = Array.from(activeMenus).reduce((sum, btn) => sum + (parseInt(btn.getAttribute('data-time'), 10) || 0), 0);

            const activeOpts = document.querySelectorAll('.irradiations button.active');
            irradiationsCount = Array.from(activeOpts).map(btn => btn.innerText.trim()).join(', ');
            selectedirradiationsTime = Array.from(activeOpts).reduce((sum, btn) => sum + (parseInt(btn.getAttribute('data-time'), 10) || 0), 0);

            selectedFullDate = '';

            // カレンダーを表示・更新
            const calendarContainer = document.querySelector('.calendar-container');
            if (calendarContainer && activeMenus.length > 0) {
                calendarContainer.style.display = 'block';
            }
            fetchAvailability(currentDate);
            updateDisplayInfo();

            // カレンダーへスクロール
            const targetElement = document.getElementById('calendar1');
            if (targetElement) {
                targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // スクロール関数
        function scrollToElement(id) {
            const element = document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // カテゴリー切替（タップしたカテゴリーのメニュー・オプションのみ表示）
        function showCategory(sectionId) {
            // 全カテゴリーを非表示
            document.querySelectorAll('.menu-section').forEach(sec => sec.classList.remove('active'));
            // 対象カテゴリーを表示
            const target = document.getElementById(sectionId);
            if (target) target.classList.add('active');

            // カテゴリーボタンのactive状態を更新
            document.querySelectorAll('#categoryButtons button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('cat_btn_' + sectionId.replace('cat_', ''));
            if (activeBtn) activeBtn.classList.add('active');
        }


        // 各ボタンでupdateDisplayInfoを呼び出すようにする
        document.querySelectorAll('.symptoms button').forEach(button => {
            button.addEventListener('click', updateDisplayInfo);
        });
        document.querySelectorAll('.irradiations button').forEach(button => {
            button.addEventListener('click', updateDisplayInfo);
        });

        document.querySelectorAll('.symptoms button').forEach(button => {
            button.addEventListener('click', () => {
                const calendarContainer = document.querySelector('.calendar-container');

                // 選択されたメニューがあればカレンダーを表示
                if (document.querySelectorAll('.symptoms button.active').length > 0) {
                    calendarContainer.style.display = 'block';
                } else {
                    // 選択が解除された場合、カレンダーを非表示
                    calendarContainer.style.display = 'none';
                }
            });
        });

        // 初期状態でカレンダーを非表示にする
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.calendar-container').style.display = 'none';
        });

        // 日付セルのクリックイベントで希望日時を更新
        document.querySelectorAll('.calendar td').forEach(cell => {
            cell.addEventListener('click', () => {
                selectDate(cell);
                updateDisplayInfo();  // 日付を選択したら即座に表示を更新
            });
        });

        function selectSymptom(button) {
            // 選択された日時をリセット
            selectedFullDate = '';
            document.querySelectorAll('.calendar td.selected').forEach(td => td.classList.remove('selected'));

            // メニューは複数選択可：クリックでトグル
            button.classList.toggle('active');

            // 現在アクティブなメニューを集計
            const activeMenus = document.querySelectorAll('.symptoms button.active');
            selectedSymptom = Array.from(activeMenus).map(btn => btn.textContent.trim());
            selectedMenuTime = Array.from(activeMenus).reduce((sum, btn) => sum + (parseInt(btn.getAttribute('data-time'), 10) || 0), 0);

            // ローカルストレージに保存（「前回と同じメニュー」用）
            localStorage.setItem('selectedSymptoms', JSON.stringify(Array.from(activeMenus).map(btn => btn.id)));

            console.log('選択されたメニューの合計時間:', selectedMenuTime);

            // カレンダー更新
            fetchAvailability(currentDate);
            updateDisplayInfo();
        }

        function selectirradiations(button) {
            selectedFullDate = '';
            document.querySelectorAll('.calendar td.selected').forEach(td => td.classList.remove('selected'));

            // オプションは複数選択可：クリックでトグル
            button.classList.toggle('active');

            // アクティブなオプションを取得
            const selectedButtons = document.querySelectorAll('.irradiations button.active');
            localStorage.setItem('selectedIrradiations', JSON.stringify(Array.from(selectedButtons).map(btn => btn.id)));

            // 表示用データ生成
            irradiationsCount = Array.from(selectedButtons).map(btn => btn.innerText.trim()).join(', ');

            // オプション所要時間の合計を更新
            selectedirradiationsTime = Array.from(selectedButtons).reduce((sum, btn) => sum + (parseInt(btn.getAttribute('data-time'), 10) || 0), 0);

            fetchAvailability(currentDate);
            updateDisplayInfo();
        }

        function updateTotalAmount() {
            totalAmount = menuPrice + optionsPrice; // オプションの価格も含める
            updateDisplayInfo(); // 表示を更新
        }

        // ご来店回数は使用しないため空関数のみ残す
        function selectVisit(element) {
            fetchAvailability(currentDate);
        }

        // メニューの選択を保存する関数
        function selectMenu(element) {
            element.classList.toggle('selected');

            let selectedMenus = JSON.parse(localStorage.getItem('selectedMenus') || '[]');
            const menuId = element.id;

            if (element.classList.contains('selected')) {
                selectedMenus.push(menuId);
            } else {
                selectedMenus = selectedMenus.filter(id => id !== menuId);
            }

            localStorage.setItem('selectedMenus', JSON.stringify(selectedMenus));
        }

        // カテゴリーなしのため showMenu は使用しない（互換性維持のため残す）
        function showMenu(menu) {
            document.getElementById("treatment-text").style.display = "none";
            selectedSymptom = [];
            irradiationsCount = '';
            menuPrice = 0;
            optionsPrice = 0;
            totalAmount = 0;
            updateDisplayInfo();
        }

        // ページ読み込み時にローカルストレージから選択状態を復元
        document.addEventListener("DOMContentLoaded", () => {
            let selectedMenus = JSON.parse(localStorage.getItem('selectedMenus') || '[]');
            selectedMenus.forEach(menuId => {
                let menuButton = document.getElementById(menuId);
                if (menuButton) {
                    menuButton.classList.add('selected');
                }
            });
        });

        function selectDate(cell) {
            // "unavailable" クラスが付いている場合はクリックを無効化
            if (cell.classList.contains('unavailable')) {
                return; // 何もせずに終了
            }

            // 既に選択されているセルの選択を解除
            const cells = document.querySelectorAll('.calendar td');
            cells.forEach(td => td.classList.remove('selected'));

            // 新しいセルを選択状態にする
            cell.classList.add('selected');

            // 選択された日付と時間を取得
            const selectedDay = cell.getAttribute('data-date'); // ISO形式の日付
            const selectedTime = cell.parentElement.firstChild.textContent; // 時間
            const date = new Date(selectedDay);

            // 日付部分を「○○年○○月○○日 ○○:○○」形式に変換
            selectedFullDate = `${date.getFullYear()}年${('0' + (date.getMonth() + 1)).slice(-2)}月${('0' + date.getDate()).slice(-2)}日 ${selectedTime}`;

            // 希望日時を即座に更新
            updateDisplayInfo();
        }

        function submitForm() {
            const formData = {
                selectedSymptom: selectedSymptom && selectedSymptom.length > 0 ? selectedSymptom : null,
                irradiationsCount: irradiationsCount,
                dates: selectedFullDate ? [selectedFullDate] : null,
                message: document.getElementById('message').value.trim()
            };

            // バリデーション（お名前・電話番号は無し）
            if (!formData.selectedSymptom) {
                alert('メニューを選択してください。');
                return;
            }

            if (!formData.dates) {
                alert('希望日時を選択してください。');
                return;
            }

            // メニュー・オプションを箇条書きに整形
            const menuText = formData.selectedSymptom.map(m => `・${m}`).join('\n');
            const optionText = formData.irradiationsCount
                ? formData.irradiationsCount.split(', ').map(o => `・${o}`).join('\n')
                : '・なし';

            // LINEトークにメッセージを送信
            liff.sendMessages([{
                type: 'text',
                text: `【予約フォーム】\n《メニュー》\n${menuText}\n\n《オプション》\n${optionText}\n\n《希望日時》\n${formData.dates[0]}\n\n《メッセージ》\n${formData.message}`
            }]).then(() => {
                /* メッセージ送信成功時の処理 */
                alert('当日キャンセルは無いようにお願いいたします。');
                /* LIFFウィンドウを閉じる */
                liff.closeWindow();
            }).catch((err) => {
                /* メッセージ送信失敗時の処理 */
                console.error('メッセージの送信に失敗しました', err);
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return `${date.getFullYear()}年${('0' + (date.getMonth() + 1)).slice(-2)}月${('0' + date.getDate()).slice(-2)}日 ${('0' + date.getHours()).slice(-2)}:${('0' + date.getMinutes()).slice(-2)}`;
        }

        async function fetchAvailability(date) {
            const startTime = new Date(date);
            const endTime = new Date(date);
            endTime.setDate(endTime.getDate() + 7);

            const cacheKey = startTime.toISOString() + endTime.toISOString();

            // キャッシュを確認
            if (availabilityCache[cacheKey]) {
                console.log('Using cached data');
                updateCalendar(availabilityCache[cacheKey].availability, availabilityCache[cacheKey].businessDays);
                return;
            }

            const url = 'https://script.google.com/macros/s/AKfycbwan96ibFf8O6g-r0xIMn6iP2EJ2CvvM-IQ441WL8ppDTADk8TpHMgtY5RILl04GnEmcw/exec' +
                `?startTime=${startTime.toISOString()}&endTime=${endTime.toISOString()}`;

            try {
                showLoadingSpinner(); // Show loading spinner
                const response = await fetch(url);
                const data = await response.json();
                console.log(data);

                // 営業日の情報を抽出
                const businessDays = data.filter(event => event.summary === "営業日").map(event => {
                    return {
                        start: new Date(event.startTime),
                        end: new Date(event.endTime)
                    };
                });

                // データをキャッシュに保存
                availabilityCache[cacheKey] = { availability: data, businessDays: businessDays };

                updateCalendar(data, businessDays);
            } catch (error) {
                console.error('Error fetching availability:', error);
            } finally {
                hideLoadingSpinner(); // Hide loading spinner
            }
        }

        function updateCalendar(availability, businessDays) {
            const calendar = document.getElementById('calendar1');
            const table = calendar.querySelector('table tbody');

            // 予約間隔15分：受付開始10:00〜（曜日別の最終受付・営業時間はWEEKLY_HOURSで判定）
            const times = [];
            for (let h = 10; h <= 19; h++) {
                for (const m of [0, 15, 30, 45]) {
                    times.push(`${('0' + h).slice(-2)}:${('0' + m).slice(-2)}`);
                }
            }

            if (table.rows.length === 0) {
                for (const time of times) {
                    const row = document.createElement('tr');
                    const timeCell = document.createElement('td');
                    timeCell.textContent = time;
                    row.appendChild(timeCell);

                    for (let i = 0; i < 7; i++) {
                        const cell = document.createElement('td');
                        cell.addEventListener('click', () => selectDate(cell));
                        row.appendChild(cell);
                    }

                    table.appendChild(row);
                }
            }

            // テーブルのヘッダーを更新
            updateCalendarHeader(currentDate);

            // 各セルを空白にリセットし、クラスもリセット
            for (let row of table.rows) {
                for (let i = 1; i < row.cells.length; i++) {
                    row.cells[i].textContent = '';
                    row.cells[i].removeAttribute('data-date');
                    row.cells[i].classList.remove('available', 'unavailable', 'selected');
                }
            }


            // 現在の日時を取得
            const now = new Date();

            // 曜日別の営業時間（0=日〜6=土）受付開始は全日10:00、終了＝最終受付（超過不可）
            const WEEKLY_HOURS = {
                0: { startH: 10, startM: 0, endH: 15, endM: 0 }, // 日 10:00〜15:00
                1: { startH: 10, startM: 0, endH: 17, endM: 0 }, // 月 10:00〜17:00
                2: { startH: 10, startM: 0, endH: 20, endM: 0 }, // 火 10:00〜20:00
                3: { startH: 10, startM: 0, endH: 17, endM: 0 }, // 水 10:00〜17:00
                4: { startH: 10, startM: 0, endH: 20, endM: 0 }, // 木 10:00〜20:00
                5: { startH: 10, startM: 0, endH: 20, endM: 0 }, // 金 10:00〜20:00
                6: { startH: 10, startM: 0, endH: 17, endM: 0 }  // 土 10:00〜17:00
            };
            const MAX_PER_SLOT = 1; // 1コマの最大予約数

            // テーブルの内容を更新
            for (let i = 0; i < 7; i++) {
                const day = new Date(currentDate);
                day.setDate(day.getDate() + i);
                const dow = day.getDay();
                const hours = WEEKLY_HOURS[dow];

                // その日の受付開始・最終受付（閉店）時刻
                const openTime = new Date(day);
                openTime.setHours(hours.startH, hours.startM, 0, 0);
                const closeTime = new Date(day);
                closeTime.setHours(hours.endH, hours.endM, 0, 0);

                for (let j = 0; j < times.length; j++) {
                    const cell = table.rows[j].cells[i + 1];

                    const slotStart = new Date(day);
                    slotStart.setHours(parseInt(times[j].split(':')[0]), parseInt(times[j].split(':')[1]), 0, 0);

                    // メニュー＋オプションの合計所要時間（未選択時は1コマ＝15分）
                    let duration = (selectedMenuTime || 0) + (selectedirradiationsTime || 0);
                    if (duration <= 0) duration = 15;
                    const slotEnd = new Date(slotStart);
                    slotEnd.setMinutes(slotStart.getMinutes() + duration);

                    // 過去の時間は×
                    if (slotStart < now) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 営業時間外、または最終受付を超過（終了が閉店を超える＝超過不可）は×
                    if (slotStart < openTime || slotEnd > closeTime) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 予約（「営業日」イベント以外）との重なり数をカウント
                    const count = availability.reduce((acc, slot) => {
                        if (slot.title === "営業日") return acc;
                        const eventStart = new Date(slot.startTime);
                        const eventEnd = new Date(slot.endTime);
                        if (eventStart < slotEnd && slotStart < eventEnd) {
                            return acc + 1;
                        }
                        return acc;
                    }, 0);

                    if (count >= MAX_PER_SLOT) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    } else {
                        cell.textContent = '◯';
                        cell.classList.add('available');
                        cell.setAttribute('data-date', slotStart.toISOString());
                    }
                }
            }
        }

        function nextWeek() {
